_schema-version: "1.0"
repository: scai-dev.common.repositories.cloud.sap
tag: v52
before-all:
  - npx cds build --production

modules:
  - name: grant-management/api
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t scai-dev.common.repositories.cloud.sap/grant-management/api:v52 -f Dockerfile . --push

  - name: grant-management/approuter
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t scai-dev.common.repositories.cloud.sap/grant-management/approuter:v52 app/router --push
