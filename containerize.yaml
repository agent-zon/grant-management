_schema-version: "1.0"
repository: scai-dev.common.repositories.cloud.sap
tag: cln
before-all:
  - npx cds build --production

modules:
  - name: grant-management/api
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t grant-management/api:cln -f Dockerfile .

  - name: grant-management/approuter
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t grant-management/approuter:cln app/router
  - name: grant-management-ams-policies-deployer
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t grant-management-ams-policies-deployer:cln -f Dockerfile.ams-policies-deployer gen/policies
