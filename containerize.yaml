_schema-version: "1.0"
repository: scai-dev.common.repositories.cloud.sap
tag: v35
before-all:
  - npx cds build --production

modules:
  - name: grant-management/api
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t grant-management/api:v35 -f Dockerfile .  

  - name: grant-management/approuter
    build-parameters:
      commands:
        - docker buildx build --platform linux/amd64 -t grant-management/approuter:v35 app/router 
