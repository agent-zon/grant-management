$schema: >-
  https://static.modelcontextprotocol.io/schemas/2025-12-11/server-card.schema.json
version: '1.0'
protocolVersions:
  - '2025-11-25'
serverInfo:
  name: commerce-mcp
  title: SAP Commerce Platform MCP Server
  version: 1.0.0
  description: >-
    MCP server for SAP Commerce Platform operations including orders, products,
    customers, and analytics
  websiteUrl: https://www.sap.com/products/commerce-cloud.html
transport:
  type: streamable-http
  endpoint: /mcp/commerce
capabilities:
  tools: {}
  resources: {}
authentication:
  required: true
  schemas:
    - oauth2
    - bearer
_meta:
  sap/category: commerce
  sap/description: Native MCP server for SAP Commerce Platform operations
tools:
  - name: orders.create
    title: Create Order
    description: Create a new sales order in the commerce platform
    inputSchema:
      type: object
      required:
        - customerId
        - items
      properties:
        customerId:
          type: string
          description: Customer ID
        items:
          type: array
          description: Order line items
          minItems: 1
          items:
            type: object
            required:
              - productId
              - quantity
            properties:
              productId:
                type: string
              quantity:
                type: number
                minimum: 1
              unitPrice:
                type: number
        shippingAddress:
          type: object
          description: Shipping address
        paymentMethod:
          type: string
          description: Payment method
    annotations:
      destructiveHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: critical
  - name: orders.read
    title: Read Order
    description: Retrieve order details by order ID
    inputSchema:
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: string
          description: Order ID
        includeItems:
          type: boolean
          default: true
        includeHistory:
          type: boolean
          default: false
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: orders.search
    title: Search Orders
    description: Search for orders with filters
    inputSchema:
      type: object
      properties:
        customerId:
          type: string
          description: Filter by customer ID
        status:
          type: string
          enum:
            - pending
            - processing
            - shipped
            - delivered
            - cancelled
          description: Filter by order status
        dateFrom:
          type: string
          format: date
          description: Filter orders from this date
        dateTo:
          type: string
          format: date
          description: Filter orders up to this date
        limit:
          type: integer
          default: 50
          minimum: 1
          maximum: 500
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: products.search
    title: Search Products
    description: Search for products in the catalog
    inputSchema:
      type: object
      properties:
        query:
          type: string
          description: Search query string
        category:
          type: string
          description: Filter by category
        priceMin:
          type: number
          description: Minimum price filter
        priceMax:
          type: number
          description: Maximum price filter
        inStock:
          type: boolean
          description: Filter by stock availability
        limit:
          type: integer
          default: 50
          minimum: 1
          maximum: 500
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: products.read
    title: Read Product
    description: Retrieve detailed product information
    inputSchema:
      type: object
      required:
        - productId
      properties:
        productId:
          type: string
          description: Product ID
        includeVariants:
          type: boolean
          default: false
        includeReviews:
          type: boolean
          default: false
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: customers.read
    title: Read Customer
    description: Retrieve customer master data
    inputSchema:
      type: object
      required:
        - customerId
      properties:
        customerId:
          type: string
          description: Customer ID
        includeOrders:
          type: boolean
          default: false
        includePreferences:
          type: boolean
          default: false
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: customers.create
    title: Create Customer
    description: Create a new customer record
    inputSchema:
      type: object
      required:
        - email
        - firstName
        - lastName
      properties:
        email:
          type: string
          format: email
        firstName:
          type: string
        lastName:
          type: string
        phone:
          type: string
        address:
          type: object
    annotations:
      destructiveHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: critical
  - name: analytics.salesInsights
    title: Get Sales Insights
    description: Retrieve sales analytics and insights
    inputSchema:
      type: object
      properties:
        dateFrom:
          type: string
          format: date
        dateTo:
          type: string
          format: date
        category:
          type: string
          description: Filter by product category
        customerSegment:
          type: string
          description: Filter by customer segment
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
  - name: workflows.orderApproval
    title: Request Order Approval
    description: Initiate order approval workflow
    inputSchema:
      type: object
      required:
        - orderId
      properties:
        orderId:
          type: string
        approverLevel:
          type: string
          enum:
            - manager
            - director
            - vp
          description: Required approval level
    annotations:
      destructiveHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: critical
  - name: fraud.detect
    title: Detect Fraud
    description: Run fraud detection on a transaction
    inputSchema:
      type: object
      required:
        - transactionAmount
        - paymentMethod
      properties:
        transactionAmount:
          type: number
        paymentMethod:
          type: string
        customerLocation:
          type: string
        orderId:
          type: string
    annotations:
      readOnlyHint: true
    _meta:
      createdBy: sap:commerce
      sap/accessLevel: authenticated-user
      sap/riskLevel: sensitive
resources: []
prompts: []
