# Expose the Function via Kyma API Gateway.
# Either: run create-secret-from-env.sh <namespace> <base_url> to set Secret + APIRule host from one URL.
# Or: replace __APIRULE_HOST__ and __NAMESPACE__, then kubectl apply -f deploy/apirule.yaml -n <namespace>
apiVersion: gateway.kyma-project.io/v2
kind: APIRule
metadata:
  name: mcp-oauth-entra
  namespace: __NAMESPACE__
spec:
  hosts:
    - __APIRULE_HOST__
  gateway: kyma-system/kyma-gateway
  service:
    name: mcp-oauth-entra
    port: 80
  corsPolicy:
    allowOrigins:
      - regex: ".*"
    allowMethods:
      - GET
      - POST
      - PUT
      - DELETE
      - OPTIONS
      - PATCH
      - HEAD
    allowHeaders:
      - "*"
    allowCredentials: false
  rules:
    - path: /*
      methods:
        - GET
        - POST
        - PUT
        - DELETE
        - OPTIONS
        - PATCH
        - HEAD
      noAuth: true
