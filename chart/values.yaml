# yaml-language-server: $schema=./values.schema.json

global:
  domain: c-127c9ef.stage.kyma.ondemand.com
  host: "{{ .Release.Name }}-approuter-{{ .Release.Namespace }}.{{ .Values.global.domain }}"
  imagePullSecret:
    name: docker-registry
  image:
    registry: scai-dev.common.repositories.cloud.sap
    tag: v69
  imagePullPolicy: Always
srv:
  replicaCount: 1
  bindings:
    auth:
      serviceInstanceName: identity
      parameters:
        credential-type: X509_GENERATED
        app-identifier: grant-api
        validity: 365
        validity-type: DAYS
    destination:
      serviceInstanceName: destination
    service-manager:
      serviceInstanceName: service-manager
    github:
      fromSecret: git-credentials
  image:
    repository: grant-management/api
  resources:
    limits:
      ephemeral-storage: 1G
      memory: 500M
    requests:
      ephemeral-storage: 512M
      cpu: 250m
      memory: 216M
  health:
    liveness:
      path: /health
    readiness:
      path: /health
  networkSecurity:
    allowNamespaceInternal: true
  env:
    - name: CDS_REQUIRES_AUTH_KIND
      value: "ias"
    - name: CDS_REQUIRES_DESTINATIONS_KIND
      value: "destinations"
    - name: BASE_API_URL
      value: "https://{{ tpl .Values.global.host . }}"
    - name: REDIS_URL
      value: "redis://{{ .Release.Name }}-redis:6379"

approuter:
  replicaCount: 1
  startupTimeoutSeconds: 120
  networkSecurity:
    allowNamespaceInternal: true
  expose:
    enabled: true
    host: "{{ tpl .Values.global.host . }}"
    corsPolicy:
      allowOrigins:
        - regex: ".*-approuter-{{ .Release.Namespace }}.{{ .Values.global.domain }}"
        - regex: ".*-{{ tpl .Values.global.host . }}"
        - exact: "https://*.{{ tpl .Values.global.domain . }}"
        - exact: "http://localhost:9000"
        - exact: "http://localhost:4338"
        - regex: ".*.euw.devtunnels.ms"
        - regex: ".*.oauth.pw"
        - regex: ".*.local.oauth.pw"
        - regex: ".*.oauth.pw:5000"
        - regex: ".*.local.oauth.pw:5000"
        - regex: ".*.authz.id"
        - regex: ".*.local.authz.id"
        - regex: ".*.authz.id:5000"
        - regex: ".*.local.authz.id:5000"
        - regex: ".*.localhost:5000"
        - regex: ".*.localhost:9000"
      allowMethods:
        - "GET"
        - "POST"
        - "PUT"
        - "DELETE"
        - "OPTIONS"
        - "PATCH"
        - "HEAD"
      allowHeaders:
        - "*"
      allowCredentials: true

  bindings:
    auth:
      serviceInstanceName: identity
      parameters:
        credential-type: X509_GENERATED
        app-identifier: approuter
        validity: 365
        validity-type: DAYS

    xsuaa:
      serviceInstanceName: xsuaa
    destination:
      serviceInstanceName: destination
  image:
    repository: grant-management/approuter
  runAsUser: 1000
  resources:
    limits:
      ephemeral-storage: 1G
      memory: 500M
    requests:
      ephemeral-storage: 1G
      cpu: 250m
      memory: 500M
  health:
    liveness:
      path: /health
    readiness:
      path: /health
  envFrom:
    - configMapRef:
        name: "{{ .Release.Name }}-approuter-configmap"
  env:
    # TENANT_HOST_PATTERN disabled — single-tenant deployment.
    # Enabling this causes 500 errors when the hostname doesn't contain a tenant subdomain.
    OTEL_EXPORTER_OTLP_ENDPOINT: http://otlp-dashboard:18889
    OTEL_EXPORTER_OTLP_PROTOCOL: http/protobuf
    OTEL_SERVICE_NAME: approuter
    OTEL_PROPAGATORS: tracecontext,baggage

portal:
  runAsUser: 1000
  image:
    repository: grant-management/portal
  resources:
    limits:
      ephemeral-storage: 1G
      memory: 500M
    requests:
      ephemeral-storage: 1G
      cpu: 500m
      memory: 500M
  health:
    liveness:
      path: /health
    readiness:
      path: /health
  networkSecurity:
    allowNamespaceInternal: true
  expose:
    enabled: true
  env:
    - name: CDS_URL
      value: "http://{{ .Release.Name }}-srv:8080"

identity:
  serviceOfferingName: identity
  servicePlanName: application
  parameters:
    name: "{{ .Release.Name }}-{{ .Release.Namespace }}"
    display-name: "Grant Management (rc-{{ .Release.Name }})"
    description: Identity service for Grant Management Application
    multi-tenant: true
    xsuaa-cross-consumption: true
    home-url: "https://{{ tpl .Values.global.host . }}/"
    consumed-services:
      - service-instance-name: "{{ .Release.Name }}-destination"
    provided-apis:
      - name: grant-management
        description: Grant Management API
      - name: grant-mcp
        description: Mcp tools for Grant Management
      - name: srv-api
        description: Service API for Grant Management
      - name: principal-propagation
        description: Principal Propagation for Grant Management
    oauth2-configuration:
      public-client: true
      grant-types:
        - authorization_code
        - client_credentials
        - refresh_token
        - urn:ietf:params:oauth:grant-type:jwt-bearer
        - urn:ietf:params:oauth:grant-type:token-exchange
        - password
      token-policy:
        access-token-format: "jwt"
        
      redirect-uris:
        - https://{{ tpl .Values.global.domain . }}/login/callback
        - https://*.{{ tpl .Values.global.domain . }}/login/callback
        - https://*.euw.devtunnels.ms/login/callback?authType=ias
        - https://*.oauth.pw/login/callback?authType=ias
        - https://*.local.oauth.pw/login/callback?authType=ias
        - https://*.oauth.pw:5000/login/callback?authType=ias
        - https://*.local.oauth.pw:5000/login/callback?authType=ias
        - https://*.authz.id/login/callback?authType=ias
        - https://*.local.authz.id/login/callback?authType=ias
        - https://*.authz.id:5000/login/callback?authType=ias
        - https://*.local.authz.id:5000/login/callback?authType=ias
        - http://localhost:5000/login/callback?authType=ias
        - http://localhost:5000/login/callback?authType=ias
        - http://localhost:9000/login/callback?authType=ias
        - http://localhost:9000/login/callback?authType=ias

      post-logout-redirect-uris:
        - https://*.{{ tpl .Values.global.domain . }}/*/logout.html

backendDestinations:
  srv-api:
    service: srv
    forwardAuthToken: true
    preserveHostHeader: true

  grant-management:
    service: srv
    forwardAuthToken: true
    preserveHostHeader: true
    authentication: OAuth2TokenExchange
    IASDependencyName: grant-management

  grant-api:
    service: srv
    forwardAuthToken: true
    preserveHostHeader: true
    authentication: OAuth2UserTokenExchange
    IASDependencyName: grant-api

  grant-mcp:
    service: srv
    preserveHostHeader: true
    forwardAuthToken: true

  mtx-api:
    service: sidecar
    forwardAuthToken: true

  portal:
    service: portal
    forwardAuthToken: true
    preserveHostHeader: true

  connection-managment:
    external: true
    name: connection-managment
    url: https://connection-managment-sdyz.bolt.host

  role-propagation:
    external: true
    name: role-propagation
    url: https://light-theme-consent-4b50.bolt.host

  consent-requests:
    external: true
    name: consent-requests
    url: https://agent-consent-d3j4.bolt.host/workloads

  governance:
    external: true
    name: governance
    url: https://control.ai.authz.id

  supply-chain-permission-request:
    external: true
    name: supply-chain-permission-request
    url: https://supplier-contact-app-tb5n.bolt.host

  agent-grant-e2e:
    external: true
    name: agent-grant-e2e
    url: https://agent-consent-d3j4.bolt.host

  authorization-live-monitor:
    external: true
    name: authorization-live-monitor
    url: https://authorization-layers-jgt9.bolt.host/live-requests

# Git credentials: ServiceInstance must exist for srv (policies admin). Optional: create from chart.
gitCredentialsInstance:
  enabled: false
  name: git-credentials
  externalName: git-credentials
  serviceOfferingName: ""
  servicePlanName: ""
  parameters: {}

# Explicit ServiceBinding (apiVersion: services.cloud.sap.com/v1). Set enabled: true to create it.
gitCredentialsBinding:
  enabled: false
  bindingName: git-credentials
  serviceInstanceName: git-credentials
  externalName: git-credentials
  secretName: git-credentials

destination:
  serviceOfferingName: destination
  servicePlanName: lite
  parameters:
    version: 1.0.0

sidecar:
  replicaCount: 1
  bindings:
    xsuaa:
      serviceInstanceName: xsuaa
    saas-registry:
      serviceInstanceName: saas-registry
    service-manager:
      serviceInstanceName: service-manager
  image:
    repository: grant-management/sidecar
  resources:
    limits:
      ephemeral-storage: 1G
      memory: 500M
    requests:
      ephemeral-storage: 512M
      cpu: 250m
      memory: 216M
  health:
    liveness:
      path: /health
    readiness:
      path: /health
  networkSecurity:
    allowNamespaceInternal: true
  env:
    NODE_ENV: production
    SUBSCRIPTION_URL: "https://${tenant_subdomain}-{{ tpl .Values.global.host . }}"

xsuaa:
  serviceOfferingName: xsuaa
  servicePlanName: application
  parameters:
    xsappname: "grant-management-{{ .Release.Namespace }}"
    tenant-mode: shared
    scopes:
      - name: "$XSAPPNAME.mtcallback"
        description: "Multi-tenancy callback scope"
        grant-as-authority-to-apps:
          - "$XSAPPNAME(application, sap-provisioning, tenant-onboarding)"

saas-registry:
  serviceOfferingName: saas-registry
  servicePlanName: application
  parameters:
    xsappname: "grant-management-{{ .Release.Namespace }}"
    appName: "grant-management-{{ .Release.Namespace }}"
    displayName: "Grant Management (Canary - {{ .Release.Namespace }})"
    description: "Grant Management (Canary - {{ .Release.Namespace }})"
    category: "AI"
    appUrls:
      getDependencies: "https://{{ .Release.Name }}-sidecar-{{ .Release.Namespace }}.{{ .Values.global.domain }}/-/cds/saas-provisioning/dependencies"
      onSubscription: "https://{{ .Release.Name }}-sidecar-{{ .Release.Namespace }}.{{ .Values.global.domain }}/-/cds/saas-provisioning/tenant/{tenantId}"
      onSubscriptionAsync: true
      onUnSubscriptionAsync: true
      onUpdateDependenciesAsync: true
      callbackTimeoutMillis: 300000

service-manager:
  serviceOfferingName: service-manager
  servicePlanName: container

redis:
  enabled: true
