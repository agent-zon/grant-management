folders:
  srv: "./srv"
typer:
  strictPropertyInitialization: false
  strictNullChecks: false
  allowArbitraryExtensions: true
log:
  levels:
    sql: error
    cds: info
    odata: info
requires:
  auth:
    kind: ias
  db:
    kind: sqlite
    credentials:
      url: db.sqlite
  grant-mcp:
    kind: rest
    credentials:
      destination: grant-mcp

  github:
    kind: rest
    credentials:
      url: https://github.tools.sap/api/v3

  destinations: true
  "[development]":
    db:
      kind: sqlite
      credentials:
        url: db.sqlite
    auth:
      kind: mocked
      users:
        alice:
          tenant: t1
          policies:
            - cap.grant_management_by_subject
        bob:
          tenant: t2
          policies:
            - cap.grant_management_by_subject
features:
  toggles:
    auth: true
  "[production]":
    emulate_vcap_services": true
